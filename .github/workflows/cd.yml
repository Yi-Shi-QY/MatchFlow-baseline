name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push_docker:
        description: "Push match-data-server Docker image to GHCR"
        required: false
        type: boolean
        default: true

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web-artifact:
    name: Build Web Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install App Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Archive Dist
        run: tar -czf web-dist.tar.gz dist

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.tar.gz
          if-no-files-found: error
          retention-days: 14

  docker-server:
    name: Build and Push Server Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.push_docker == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Image Name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/match-data-server" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./match-data-server
          file: ./match-data-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - web-artifact
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-dist.tar.gz
          generate_release_notes: true

