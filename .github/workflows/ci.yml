name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-quality:
    name: App Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install App Dependencies
        run: npm ci

      - name: Type Check
        run: npm run lint

      - name: Build App
        run: npm run build

  server-quality:
    name: Server Syntax and Startup Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: match-data-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Server Dependencies
        run: npm install --no-audit --no-fund

      - name: Check Entry Syntax
        run: node --check index.js

      - name: Check Module Syntax
        run: |
          find src -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Mock Mode Health Check
        env:
          API_KEY: ci-secret
        run: |
          node index.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:3001/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3001/health > /tmp/health.json
          cat /tmp/health.json
          curl -sf -H "Authorization: Bearer ci-secret" http://127.0.0.1:3001/matches > /tmp/matches.json
          cat /tmp/matches.json | head -c 400
