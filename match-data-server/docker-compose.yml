services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - API_KEY=${API_KEY:-your-secret-key}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-matchflow}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-matchflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/bootstrap/schema.sql:ro
      - ./migrations:/bootstrap/migrations:ro
      - ./docker/init/00-bootstrap.sh:/docker-entrypoint-initdb.d/00-bootstrap.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-matchflow}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
